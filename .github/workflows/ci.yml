name: GlowCart CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pyarrow faker duckdb

    - name: Test event generator
      run: |
        python3 -c "
        from ingestion.scripts.generate_events import generate_user, generate_event
        user = generate_user()
        event = generate_event(user)
        assert 'event_id' in event
        assert 'event_type' in event
        assert event['event_type'] in ['page_view','add_to_cart','checkout','payment_success','payment_failed']
        assert 'user' in event
        assert 'product' in event
        print('✅ Event generator test passed')
        "

    - name: Test data schema
      run: |
        python3 -c "
        from ingestion.scripts.generate_events import generate_user, generate_event
        import pandas as pd
        events = []
        for i in range(100):
            user = generate_user()
            event = generate_event(user)
            events.append({
                'event_id': event['event_id'],
                'event_type': event['event_type'],
                'user_id': event['user']['user_id'],
                'product_id': event['product']['id'],
            })
        df = pd.DataFrame(events)
        assert df['event_id'].nunique() == 100, 'event_id must be unique'
        assert df['event_type'].isin(['page_view','add_to_cart','checkout','payment_success','payment_failed']).all()
        assert df['user_id'].notna().all()
        assert df['product_id'].notna().all()
        print(f'✅ Schema test passed — {len(df)} events validated')
        "

    - name: Test bulk generator
      run: |
        python3 -c "
        from ingestion.scripts.bulk_generate import generate_event, PRODUCTS, CITIES
        assert len(PRODUCTS) >= 10, 'Need at least 10 products'
        assert len(CITIES) >= 10, 'Need at least 10 cities'
        event = generate_event(hours_ago=0)
        assert event['user']['city'] in CITIES
        print('✅ Bulk generator test passed')
        "

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install flake8
      run: pip install flake8

    - name: Lint with flake8
      run: |
        flake8 ingestion/ storage/ serving/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__
        echo "✅ Lint passed"
