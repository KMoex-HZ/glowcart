version: 2

models:
  - name: stg_events
    description: "Cleaned and standardized events from Silver layer"
    columns:
      - name: event_id
        description: "Unique identifier for each event"
        tests:
          - unique
          - not_null
      - name: event_type
        description: "Type of user action"
        tests:
          - not_null
          - accepted_values:
              values: ['page_view', 'add_to_cart', 'checkout', 'payment_success', 'payment_failed']
      - name: user_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
